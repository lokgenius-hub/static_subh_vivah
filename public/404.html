<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VivahSthal</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect — preserves the path for client-side routing
    var segments = 1; // 1 for project pages (username.github.io/repo-name)
    var loc = window.location;
    loc.replace(
      loc.protocol + '//' + loc.hostname + (loc.port ? ':' + loc.port : '') +
      loc.pathname.split('/').slice(0, 1 + segments).join('/') + '/?p=/' +
      loc.pathname.slice(1).split('/').slice(segments).join('/').replace(/&/g, '~and~') +
      (loc.search ? '&q=' + loc.search.slice(1).replace(/&/g, '~and~') : '') +
      loc.hash
    );
  </script>
</head>
<body></body>
</html>
